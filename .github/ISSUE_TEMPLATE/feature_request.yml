name: Feature request
description: Suggest an improvement or new capability.
title: '[feat] '
labels: ['enhancement', 'needs-triage']
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case in your own words. What were you trying to do when you reached for this?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like the extension to behave?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried, or other approaches you considered.
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Mockups, links, related issues.
