<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>D365 Service Atlas</title>
    <style>
      :root {
        --bg: #f6f7f9;
        --panel: #fff;
        --panel-soft: #fbfcfd;
        --text: #1f2933;
        --muted: #637083;
        --line: #d8dee7;
        --line-soft: #e9edf3;
        --brand: #125a87;
        --brand-strong: #0d466d;
        --brand-soft: #e8f2f8;
        --success: #16753c;
        --danger: #b42335;
        --shadow: 0 1px 2px rgba(20, 32, 46, 0.08);
        color-scheme: light;
      }

      html,
      body {
        height: 100%;
      }
      body {
        font:
          13px/1.45 system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        color: var(--text);
        background: var(--bg);
      }
      h1 {
        font-size: 15px;
        line-height: 1.2;
        margin: 0;
        letter-spacing: 0;
      }

      .app-header {
        position: sticky;
        top: 0;
        z-index: 5;
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 12px;
        background: rgba(246, 247, 249, 0.96);
        border-bottom: 1px solid var(--line);
        backdrop-filter: blur(8px);
      }
      .title-row {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 10px;
      }
      .title-mark {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }
      .logo-dot {
        width: 9px;
        height: 28px;
        border-radius: 999px;
        background: var(--brand);
        box-shadow: inset 0 -10px 0 rgba(255, 255, 255, 0.18);
        flex: 0 0 auto;
      }
      .title-text {
        min-width: 0;
      }

      .search-wrap {
        position: relative;
      }
      .search-wrap::before {
        content: '';
        position: absolute;
        left: 10px;
        top: 50%;
        width: 12px;
        height: 12px;
        border: 1.8px solid var(--muted);
        border-radius: 50%;
        transform: translateY(-50%);
        opacity: 0.78;
        pointer-events: none;
      }
      .search-wrap::after {
        content: '';
        position: absolute;
        left: 21px;
        top: 50%;
        width: 6px;
        height: 1.8px;
        background: var(--muted);
        border-radius: 2px;
        transform: translateY(4px) rotate(45deg);
        opacity: 0.78;
        pointer-events: none;
      }
      #search {
        width: 100%;
        padding: 8px 10px 8px 34px;
        font: inherit;
        box-sizing: border-box;
        color: var(--text);
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 6px;
        box-shadow: var(--shadow);
        outline: none;
      }
      #search:focus {
        border-color: var(--brand);
        box-shadow: 0 0 0 3px rgba(18, 90, 135, 0.14);
      }
      .search-wrap:has(#search.hidden) {
        display: none;
      }
      .search-hint {
        color: var(--muted);
        font-size: 11px;
        margin-top: 4px;
        padding: 0 2px;
      }
      .search-hint.hidden {
        display: none;
      }
      .app-header:has(#search.hidden) .search-hint {
        display: none;
      }

      .breadcrumb {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 6px;
        font-size: 12px;
        color: var(--muted);
      }
      .crumb-link,
      .crumb-link:visited,
      .crumb-link:active {
        color: var(--brand);
        cursor: pointer;
        text-decoration: none;
      }
      .crumb-link:hover {
        color: var(--brand-strong);
        text-decoration: underline;
      }
      .crumb-sep {
        color: #9aa4b2;
      }
      .crumb-name {
        color: var(--text);
        font-weight: 650;
        word-break: break-all;
      }

      .status-row {
        display: flex;
        align-items: center;
        gap: 8px;
        min-height: 1.2em;
      }
      .status {
        color: var(--muted);
        font-size: 12px;
        font-weight: 600;
        flex: 1;
        min-width: 0;
      }
      .status.ok {
        color: var(--success);
      }
      .status.err {
        color: var(--danger);
      }
      .status-row:has(.status.hidden) {
        display: none;
      }
      .actions {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        flex-wrap: wrap;
        gap: 6px;
        flex: 1 1 96px;
      }
      .actions:empty {
        display: none;
      }

      .content {
        flex: 1;
        overflow: auto;
        padding: 12px;
      }

      .groups {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .group-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 42px 10px;
        align-items: center;
        gap: 8px;
        padding: 9px 10px;
        cursor: pointer;
        border: 1px solid var(--line-soft);
        border-radius: 6px;
        background: var(--panel);
        box-shadow: var(--shadow);
        user-select: none;
        transition:
          border-color 0.12s ease,
          box-shadow 0.12s ease,
          transform 0.12s ease;
      }
      .group-row.plain-row {
        grid-template-columns: minmax(0, 1fr) 10px;
      }
      .group-row:hover {
        border-color: #c9d9e4;
        box-shadow: 0 3px 10px rgba(20, 32, 46, 0.08);
        transform: translateY(-1px);
      }
      .group-row .group-name {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-weight: 600;
      }
      .group-row .chev {
        color: var(--brand);
        font-size: 17px;
        line-height: 1;
        text-align: right;
      }

      .empty-state {
        padding: 28px 16px;
        color: var(--muted);
        text-align: center;
        border: 1px dashed var(--line);
        border-radius: 8px;
        background: var(--panel-soft);
      }
      .list-section {
        margin-bottom: 14px;
      }
      .list-section-title {
        margin: 0 0 6px;
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .result-meta {
        color: var(--muted);
        font-size: 11px;
        margin-top: 2px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .group-row .group-main {
        min-width: 0;
      }
      .group-row .group-kind {
        color: var(--muted);
        font-size: 11px;
        line-height: 1.2;
        text-align: right;
        white-space: nowrap;
      }

      button {
        font: inherit;
      }
      .export-btn {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 5px 9px;
        cursor: pointer;
        background: var(--panel);
        color: var(--brand-strong);
        border: 1px solid var(--line);
        border-radius: 6px;
        font-size: 12px;
        font-weight: 650;
      }
      .export-btn:hover {
        background: var(--brand-soft);
        border-color: #bfd3df;
      }
      .copy-btn {
        padding: 5px 9px;
        font-size: 12px;
        cursor: pointer;
        background: var(--panel);
        color: var(--brand-strong);
        border: 1px solid var(--line);
        border-radius: 6px;
        font-weight: 650;
      }
      .copy-btn:hover {
        background: var(--brand-soft);
        border-color: #bfd3df;
      }

      .service-section {
        margin-bottom: 14px;
      }
      .service-header {
        padding: 9px 10px;
        border: 1px solid var(--line-soft);
        border-radius: 7px 7px 0 0;
        background: var(--panel-soft);
        margin-bottom: -1px;
      }
      .service-title-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .service-title {
        font-weight: 700;
        font-size: 14px;
        min-width: 0;
        overflow-wrap: anywhere;
      }
      .service-count {
        color: var(--muted);
        font-size: 11px;
        white-space: nowrap;
      }
      .method {
        font:
          11px/1 ui-monospace,
          monospace;
        background: var(--brand-soft);
        color: var(--brand-strong);
        border: 1px solid #c7dce8;
        padding: 4px 6px;
        border-radius: 4px;
        font-weight: 800;
        flex: 0 0 auto;
      }

      .op-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 10px;
        cursor: pointer;
        border: 1px solid var(--line-soft);
        background: var(--panel);
        margin-bottom: -1px;
        user-select: none;
      }
      .op-row:last-child {
        border-radius: 0 0 7px 7px;
        margin-bottom: 0;
      }
      .op-row:hover {
        background: #f7fafc;
        border-color: #cbd8e2;
        position: relative;
        z-index: 1;
      }
      .op-row .op-path {
        font:
          12px ui-monospace,
          Menlo,
          Consolas,
          monospace;
        color: var(--brand-strong);
        word-break: break-all;
        flex: 1;
      }
      .op-row .chev {
        color: var(--brand);
        font-size: 16px;
        line-height: 1;
      }

      .op-page-header {
        padding: 10px;
        border: 1px solid var(--line-soft);
        border-radius: 7px;
        background: var(--panel);
        box-shadow: var(--shadow);
        margin-bottom: 12px;
      }
      .op-page-top {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .op-page-path {
        font:
          13px ui-monospace,
          Menlo,
          Consolas,
          monospace;
        color: var(--brand-strong);
        word-break: break-all;
        font-weight: 650;
      }
      .endpoint-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 6px;
        margin: 0 0 8px;
      }
      .op-page-url {
        display: flex;
        min-width: 0;
        font:
          11px ui-monospace,
          Menlo,
          Consolas,
          monospace;
        color: var(--muted);
        white-space: nowrap;
        user-select: none;
      }
      .op-page-url .url-start,
      .op-page-url .url-end {
        min-width: 0;
        overflow: hidden;
      }
      .op-page-url .url-start {
        flex: 1 1 48%;
      }
      .op-page-url .url-end {
        flex: 1 1 52%;
        direction: rtl;
        text-align: left;
      }
      .op-page-url .url-ellipsis {
        flex: 0 0 auto;
        padding: 0 2px;
        color: #8c96a5;
      }
      .op-page-section {
        margin-bottom: 12px;
      }
      .op-page-section .section-title {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--muted);
        font-weight: 800;
        margin: 10px 0 5px;
      }
      .section-title-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin: 10px 0 5px;
      }
      .section-title-row .section-title {
        margin: 0;
      }
      .example-code {
        margin: 0;
        font:
          12px/1.5 ui-monospace,
          Menlo,
          Consolas,
          monospace;
        color: var(--text);
        background: #fbfcfd;
        border: 1px solid var(--line-soft);
        border-radius: 7px;
        padding: 9px 10px;
        overflow-x: auto;
        overflow-y: hidden;
        white-space: pre;
      }
      .icon-copy-btn {
        position: relative;
        width: 24px;
        height: 24px;
        padding: 0;
        border: 1px solid var(--line);
        border-radius: 5px;
        background: var(--panel);
        cursor: pointer;
        flex: 0 0 auto;
      }
      .icon-copy-btn::before,
      .icon-copy-btn::after {
        content: '';
        position: absolute;
        width: 9px;
        height: 11px;
        border: 1.7px solid var(--brand-strong);
        border-radius: 2px;
        background: var(--panel);
        box-sizing: border-box;
      }
      .icon-copy-btn::before {
        left: 6px;
        top: 7px;
        opacity: 0.65;
      }
      .icon-copy-btn::after {
        left: 9px;
        top: 5px;
      }
      .icon-copy-btn:hover {
        background: var(--brand-soft);
        border-color: #bfd3df;
      }
      .icon-copy-btn.copied {
        background: #e9f7ef;
        border-color: #b8dfc5;
      }
      .icon-copy-btn.failed {
        background: #fff3f4;
        border-color: #efbdc5;
      }

      .usages {
        display: flex;
        flex-direction: column;
      }
      .usages .op-row {
        gap: 8px;
      }
      .usages .op-row .op-path {
        font:
          12px ui-monospace,
          Menlo,
          Consolas,
          monospace;
      }
      .usages .op-row .pmeta {
        color: var(--muted);
        font-size: 11px;
      }

      .schema {
        font:
          12px/1.55 ui-monospace,
          Menlo,
          Consolas,
          monospace;
        background: #fbfcfd;
        border: 1px solid var(--line-soft);
        border-radius: 7px;
        padding: 9px 10px;
        overflow-x: auto;
        overflow-y: hidden;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.75);
      }
      .schema > .brace,
      .schema > .children,
      .schema > .prop {
        display: table;
        min-width: 100%;
      }
      .schema .brace {
        color: #788393;
        font-weight: 700;
      }
      .prop {
        padding: 1px 0;
      }
      .prop > .row {
        display: flex;
        gap: 6px;
        align-items: baseline;
        flex-wrap: nowrap;
        white-space: nowrap;
      }
      .prop .pname {
        color: var(--brand-strong);
        font-weight: 650;
      }
      .prop .ptype {
        color: #76512f;
      }
      .prop a.ptype-link {
        color: #76512f;
        text-decoration: none;
        cursor: pointer;
      }
      .prop a.ptype-link:hover {
        text-decoration: underline;
      }
      .prop a.ptype-link:visited {
        color: #76512f;
      }
      .prop .pmark {
        color: var(--danger);
        font-weight: 800;
      }
      .prop .pmeta {
        color: var(--muted);
        font-size: 11px;
      }
      .prop .penum {
        color: var(--brand);
        font-size: 11px;
        white-space: nowrap;
      }
      .schema .children {
        display: table;
        min-width: max-content;
        margin-left: 14px;
        padding-left: 8px;
        border-left: 1px solid #dce3eb;
      }
      .prop .truncated {
        color: #8a95a3;
        font-style: italic;
      }

      .error-card {
        border: 1px solid #f0bec7;
        background: #fff7f8;
        border-radius: 7px;
        padding: 10px;
        box-shadow: var(--shadow);
      }
      .error-card .err-title {
        font-weight: 700;
        color: var(--danger);
        margin-bottom: 4px;
      }
      .error-card .err-meta {
        font-size: 11px;
        color: var(--muted);
        margin-bottom: 6px;
        word-break: break-all;
      }
      .error-card .err-hint {
        color: var(--muted);
        font-size: 12px;
        white-space: pre-wrap;
      }
      .error-card pre {
        margin: 0;
        background: #fff;
        border: 1px solid #f1d2d8;
        border-radius: 5px;
        padding: 7px 8px;
        max-height: 280px;
        overflow: auto;
        font:
          11px/1.45 ui-monospace,
          Menlo,
          Consolas,
          monospace;
        white-space: pre-wrap;
        word-break: break-word;
      }

      @media (max-width: 260px) {
        body {
          font-size: 12px;
        }
        .app-header {
          gap: 8px;
          padding: 8px;
        }
        .title-row {
          flex-direction: column;
          align-items: stretch;
          gap: 8px;
        }
        .title-mark {
          align-items: flex-start;
        }
        .logo-dot {
          width: 7px;
          height: 24px;
        }
        h1 {
          font-size: 14px;
        }
        .actions {
          width: 100%;
          flex-basis: auto;
          gap: 5px;
        }
        .actions:empty {
          display: none;
        }
        .copy-btn,
        .export-btn {
          min-width: 0;
          padding: 5px 6px;
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }
        .content {
          padding: 8px;
        }
        .group-row {
          grid-template-columns: minmax(0, 1fr) 30px 8px;
          gap: 6px;
          padding: 8px;
        }
        .group-row .group-kind {
          font-size: 10px;
        }
        .result-meta {
          white-space: normal;
        }
        .service-header {
          padding: 8px;
        }
        .service-title-row {
          align-items: flex-start;
        }
        .service-count {
          white-space: normal;
          text-align: right;
        }
        .op-row {
          display: grid;
          grid-template-columns: auto minmax(0, 1fr) 8px;
          gap: 7px;
          padding: 8px;
        }
        .op-page-header,
        .schema,
        .example-code {
          padding: 8px;
        }
        .endpoint-row {
          gap: 5px;
        }
        .icon-copy-btn {
          width: 23px;
          height: 23px;
        }
        .op-page-top {
          align-items: flex-start;
          gap: 7px;
        }
        .method {
          padding: 3px 5px;
          font-size: 10px;
        }
        .breadcrumb {
          gap: 4px;
        }
      }

      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <header class="app-header">
      <div class="title-row">
        <div class="title-mark">
          <span class="logo-dot" aria-hidden="true"></span>
          <div class="title-text">
            <h1>D365 Service Atlas</h1>
          </div>
        </div>
        <div class="actions" id="actions"></div>
      </div>

      <div class="search-wrap">
        <input id="search" type="search" placeholder="Search service groups…" autocomplete="off" />
      </div>
      <div id="search-hint" class="search-hint hidden"></div>

      <div id="breadcrumb" class="breadcrumb hidden"></div>

      <div class="status-row">
        <div class="status" id="status">Loading…</div>
      </div>
    </header>
    <div class="content" id="content"></div>

    <script type="module" src="panel.js"></script>
  </body>
</html>
